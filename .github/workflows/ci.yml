name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze package
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Analyze example
        working-directory: example
        run: |
          flutter pub get
          flutter analyze
