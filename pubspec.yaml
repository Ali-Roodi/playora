name: playora
description: "Production-grade Flutter video player with a custom RTL-aware skin — HLS/MP4, quality/speed/subtitle/audio menus, ads, gestures, playlists and optional analytics."
version: 0.4.1
homepage: https://ali-roodi.github.io/playora/
repository: https://github.com/Ali-Roodi/playora
issue_tracker: https://github.com/Ali-Roodi/playora/issues
topics: [video, player, hls, media-kit, rtl]

environment:
  sdk: ^3.12.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  media_kit: ^1.2.6
  media_kit_libs_video: ^1.0.7
  media_kit_video: ^2.0.1
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

